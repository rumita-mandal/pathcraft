name: PathCraft CI/CD Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  # Job 1: Test & Lint Backend
  backend-ci:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout repository code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Cache Python dependencies
      uses: actions/cache@v4
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('backend/requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r backend/requirements.txt

    - name: Verify Django database migrations & syntax
      working-directory: ./backend
      run: |
        python manage.py check

  # Job 2: Test & Build Frontend
  frontend-ci:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout repository code
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: frontend/package.json

    - name: Install dependencies
      working-directory: ./frontend
      run: npm ci

    - name: Compile and build React distribution assets
      working-directory: ./frontend
      run: npm run build

  # Job 3: Validate Docker Configuration & Build Images
  docker-validation:
    runs-on: ubuntu-latest
    needs: [backend-ci, frontend-ci]
    steps:
    - name: Checkout repository code
      uses: actions/checkout@v4

    - name: Validate Docker Compose Configuration
      run: docker compose config

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Build Backend Docker Image
      uses: docker/build-push-action@v5
      with:
        context: ./backend
        file: ./backend/Dockerfile
        push: false

    - name: Build Frontend Docker Image
      uses: docker/build-push-action@v5
      with:
        context: ./frontend
        file: ./frontend/Dockerfile
        push: false
          # Job 4: Trigger Deployment (Render Auto-Deploy)
  deploy:
    runs-on: ubuntu-latest
    needs: [docker-validation]
    steps:
    - name: Render Deployment Status
      run: |
        echo "🚀 Validation Complete! Code is merged to main."
        echo "✅ Render is automatically pulling these changes and deploying them to production right now."
        echo "To track the live deployment, check your Render dashboard."
